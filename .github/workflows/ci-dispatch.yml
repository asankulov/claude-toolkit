name: CI Dispatcher

# Root orchestrator — detects which subproject changed and runs its CI.
#
# Convention: each subproject keeps its full pipeline in
#   <subproject>/.github/workflows/ci.yml
#
# To add a new subproject:
#   1. Add a path filter entry below (e.g. my-workflow: 'my-workflow/**')
#   2. Add a corresponding trigger job that calls .github/workflows/<subproject>.yml
#   3. Create a thin stub at .github/workflows/<subproject>.yml
#      (see claude-code-remote.yml as the template)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    name: Detect changed subprojects
    runs-on: ubuntu-latest
    outputs:
      claude-code-remote: ${{ steps.filter.outputs.claude-code-remote }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            claude-code-remote:
              - 'claude-code-remote/**'

  # ── claude-code-remote ────────────────────────────────────────────────────────
  # Full pipeline lives in: claude-code-remote/.github/workflows/ci.yml
  # Root stub:              .github/workflows/claude-code-remote.yml
  trigger-claude-code-remote:
    name: CI › claude-code-remote
    needs: detect-changes
    if: needs.detect-changes.outputs.claude-code-remote == 'true' || github.event_name == 'pull_request'
    uses: ./.github/workflows/claude-code-remote.yml
    secrets: inherit
