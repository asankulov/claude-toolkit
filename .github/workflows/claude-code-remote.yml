name: CI › claude-code-remote (stub)

# ⚠️  This is a thin root stub required by GitHub Actions' workflow_call constraint.
#     The actual pipeline logic lives in:
#       claude-code-remote/.github/workflows/ci.yml
#
# DO NOT add job logic here. Edit the subproject file instead.

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to VPS after lint passes? (true/false)"
        required: false
        default: "false"

jobs:
  run-subproject-ci:
    name: Run claude-code-remote CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Lint ─────────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8 shellcheck-py

      - name: Lint Python (flake8)
        working-directory: claude-code-remote
        run: |
          flake8 bot.py --max-line-length=100 --extend-ignore=E501
          python -m py_compile bot.py && echo "bot.py syntax OK"

      - name: Lint shell script (shellcheck)
        working-directory: claude-code-remote
        run: shellcheck install.sh

      # ── Secret scan ───────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Deploy (only when deploy=true on workflow_dispatch) ───────────────────
      - name: Set up SSH agent
        if: ${{ github.event.inputs.deploy == 'true' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Write deploy script
        if: ${{ github.event.inputs.deploy == 'true' }}
        run: |
          cat > /tmp/deploy.sh << 'EOF'
          set -e
          export PATH="$PATH:/usr/local/bin:/usr/bin:/home/$USER/.npm-global/bin"
          [ -f "$HOME/.bashrc" ] && source "$HOME/.bashrc" 2>/dev/null || true
          [ -f "$HOME/.nvm/nvm.sh" ] && source "$HOME/.nvm/nvm.sh" 2>/dev/null || true

          printf 'TELEGRAM_BOT_TOKEN=%s\nTELEGRAM_USER_ID=%s\nANTHROPIC_API_KEY=%s\n' \
            "$TELEGRAM_BOT_TOKEN" "$TELEGRAM_USER_ID" "$ANTHROPIC_API_KEY" \
            > ~/claude-code-remote/.env
          chmod 600 ~/claude-code-remote/.env
          echo "[+] .env written."

          cd ~/claude-code-remote
          set -a && source .env && set +a

          if ! command -v claude > /dev/null 2>&1; then
            echo "[!] claude not found — run install.sh manually on the VPS first." >&2
            exit 1
          fi
          echo "[✓] Claude Code already installed."

          cd ~/claude-code-remote
          $HOME/.local/bin/uv sync --quiet
          echo "[✓] Python dependencies synced."

          tmux kill-session -t tgbot 2>/dev/null || true
          tmux new-session -d -s tgbot \
            "set -a && source ~/claude-code-remote/.env && set +a && $HOME/.local/bin/uv run --project ~/claude-code-remote python ~/claude-code-remote/bot.py"
          echo "[✓] tgbot started."
          EOF

      - name: Sync files and deploy to VPS
        if: ${{ github.event.inputs.deploy == 'true' }}
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

          rsync -az --delete \
            --exclude='.git' \
            --exclude='.env' \
            claude-code-remote/ \
            "$VPS_USER@$VPS_HOST:~/claude-code-remote/"

          ssh "$VPS_USER@$VPS_HOST" \
            TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN" \
            TELEGRAM_USER_ID="$TELEGRAM_USER_ID" \
            ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
            bash -s < /tmp/deploy.sh

          echo "### Deployed" >> $GITHUB_STEP_SUMMARY
          echo "Host: $VPS_HOST | Ref: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
