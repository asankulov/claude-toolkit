name: CI › claude-code-remote

# Called by ci-dispatch.yml when claude-code-remote/** changes.
# Can also be triggered manually (workflow_dispatch) for ad-hoc runs.

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to VPS after lint passes? (true/false)"
        required: false
        default: "false"

jobs:
  # ── 1. Lint & syntax ──────────────────────────────────────────────────────────
  lint:
    name: Lint & syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: claude-code-remote

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8 shellcheck-py

      - name: Lint Python (flake8)
        run: |
          flake8 bot.py \
            --max-line-length=100 \
            --extend-ignore=E501

      - name: Check Python syntax
        run: python -m py_compile bot.py && echo "✅ bot.py syntax OK"

      - name: Lint shell script (shellcheck)
        run: shellcheck install.sh

  # ── 2. Security — secret scan ─────────────────────────────────────────────────
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so gitleaks can scan all commits

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Deploy to VPS ──────────────────────────────────────────────────────────
  # Runs only when:
  #   a) workflow is manually dispatched with deploy=true, OR
  #   b) a git tag like v* is pushed (handled by release.yml)
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [lint, secret-scan]
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy == 'true'
    environment: production   # requires manual approval in GitHub → Environments

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      # ── Sync project files ──────────────────────────────────────────────────
      - name: Sync files to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' \
            claude-code-remote/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/claude-code-remote/"

      # ── Write .env from GitHub secrets ────────────────────────────────────
      - name: Write .env on VPS
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN" \
            TELEGRAM_USER_ID="$TELEGRAM_USER_ID" \
            ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
            bash -s << 'REMOTE'
            set -e
            printf 'TELEGRAM_BOT_TOKEN=%s\nTELEGRAM_USER_ID=%s\nANTHROPIC_API_KEY=%s\n' \
              "$TELEGRAM_BOT_TOKEN" "$TELEGRAM_USER_ID" "$ANTHROPIC_API_KEY" \
              > ~/claude-code-remote/.env
            chmod 600 ~/claude-code-remote/.env
            echo "[✓] .env written."
REMOTE

      # ── Run install.sh if this is a fresh server (idempotent) ──────────────
      - name: Bootstrap VPS (idempotent install)
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" bash << 'REMOTE'
            set -e
            cd ~/claude-code-remote
            set -a && source .env && set +a

            # Only run full install if Claude Code isn't present yet
            if ! command -v claude &>/dev/null; then
              echo "[+] Claude Code not found — running install.sh..."
              bash install.sh
            else
              echo "[✓] Claude Code already installed — skipping full install."
            fi

            # Restart bot so it picks up any credential changes
            tmux kill-session -t tgbot 2>/dev/null || true
            tmux new-session -d -s tgbot \
              "set -a && source ~/claude-code-remote/.env && set +a && python3 ~/claude-code-remote/bot.py"
            echo "[✓] tgbot started with updated credentials."

            echo "[✓] VPS is up to date."
          REMOTE

      - name: Deployment summary
        run: |
          echo "### Deployment complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- Host: \`${{ secrets.VPS_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Ref: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
