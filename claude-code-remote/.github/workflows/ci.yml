name: CI › claude-code-remote

# Called by ci-dispatch.yml when claude-code-remote/** changes.
# Can also be triggered manually (workflow_dispatch) for ad-hoc runs.

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to VPS after lint passes? (true/false)"
        required: false
        default: "false"

jobs:
  # ── 1. Lint & syntax ──────────────────────────────────────────────────────────
  lint:
    name: Lint & syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: claude-code-remote

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8 shellcheck-py

      - name: Lint Python (flake8)
        run: |
          flake8 bot.py \
            --max-line-length=100 \
            --extend-ignore=E501

      - name: Check Python syntax
        run: python -m py_compile bot.py && echo "bot.py syntax OK"

      - name: Lint shell script (shellcheck)
        run: shellcheck install.sh

  # ── 2. Security — secret scan ─────────────────────────────────────────────────
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Deploy to VPS ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [lint, secret-scan]
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy == 'true'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.env' \
            claude-code-remote/ \
            "$VPS_USER@$VPS_HOST:~/claude-code-remote/"

      - name: Write remote deploy script
        run: |
          cat > /tmp/vps-deploy.sh << 'EOF'
          set -e
          printf 'TELEGRAM_BOT_TOKEN=%s\nTELEGRAM_USER_ID=%s\nANTHROPIC_API_KEY=%s\n' \
            "$TELEGRAM_BOT_TOKEN" "$TELEGRAM_USER_ID" "$ANTHROPIC_API_KEY" \
            > ~/claude-code-remote/.env
          chmod 600 ~/claude-code-remote/.env
          echo "[+] .env written."
          cd ~/claude-code-remote
          set -a && source .env && set +a
          if ! command -v claude > /dev/null 2>&1; then
            echo "[+] Running install.sh..."
            bash install.sh
          else
            echo "[✓] Claude Code already installed."
          fi
          tmux kill-session -t tgbot 2>/dev/null || true
          tmux new-session -d -s tgbot \
            "set -a && source ~/claude-code-remote/.env && set +a && python3 ~/claude-code-remote/bot.py"
          echo "[✓] tgbot started."
          EOF

      - name: Bootstrap and start bot on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" \
            TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN" \
            TELEGRAM_USER_ID="$TELEGRAM_USER_ID" \
            ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
            bash -s < /tmp/vps-deploy.sh

      - name: Deployment summary
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "### Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "Host: $VPS_HOST | Ref: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
